<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Brand colors (Teal to Pink) -->
    <linearGradient id="vintamie-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09b0b7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Neon glow effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark glassmorphic background -->
  <rect width="512" height="512" rx="120" fill="#07090d" />
  <rect width="504" height="504" x="4" y="4" rx="116" stroke="rgba(255, 255, 255, 0.08)" stroke-width="8" />

  <!-- Orbit Rings -->
  <circle cx="256" cy="256" r="210" stroke="url(#vintamie-grad)" stroke-width="4" stroke-dasharray="12 8" opacity="0.15" />
  
  <g filter="url(#neon-glow)">
    <!-- Hanger Hook (Sleek abstract curve) -->
    <path d="M 256 195 V 160 C 256 130, 235 110, 256 85 C 275 60, 295 85, 275 105" stroke="url(#vintamie-grad)" stroke-width="16" stroke-linecap="round" fill="none" />

    <!-- Sleek Hanger Triangle (representing clothes/fashion) -->
    <!-- It forms a 'V' pointing down at the bottom -->
    <path d="M 110 220 L 256 390 L 402 220 C 412 210, 405 195, 390 195 L 122 195 C 107 195, 100 210, 110 220 Z" fill="#07090d" stroke="url(#vintamie-grad)" stroke-width="16" stroke-linejoin="round" />

    <!-- Camera Lens / Vision AI Core (overlapping the V) -->
    <circle cx="256" cy="275" r="55" stroke="url(#vintamie-grad)" stroke-width="12" fill="#07090d" />
    <circle cx="256" cy="275" r="22" fill="url(#vintamie-grad)" />
    <!-- Lens reflection -->
    <circle cx="264" cy="267" r="6" fill="#fff" opacity="0.8" />
    
    <!-- Sparkles -->
    <!-- Top-Right Sparkle -->
    <path d="M 400 100 c 0 12 -8 20 -20 20 c 12 0 20 8 20 20 c 0 -12 8 -20 20 -20 c -12 0 -20 -8 -20 -20 z" fill="#ec4899" />
    <!-- Left Sparkle -->
    <path d="M 100 320 c 0 8 -5 12 -12 12 c 7 0 12 5 12 12 c 0 -7 5 -12 12 -12 c -7 0 -12 -5 -12 -12 z" fill="#09b0b7" />
  </g>
</svg>