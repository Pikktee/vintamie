name: Build Android App

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'VERSION'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Wait for backend redeploy
        run: sleep 120

      - name: Upload APK to Vintamie Backend
        working-directory: android
        run: |
          VERSION=$(cat ../VERSION)
          curl -f -X POST -H "X-Upload-Secret: ${{ secrets.APP_UPLOAD_SECRET }}" \
               -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
               "https://api.vintamie.henrikheil.net/api/app/upload-apk?version=$VERSION"
