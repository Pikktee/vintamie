<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vintamie Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <span class="logo-text">✨ Vintamie</span>
      <span class="status-badge disconnected" id="status">Nicht angemeldet</span>
    </div>
    
    <!-- Server Environment Toggle -->
    <div class="env-toggle" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); padding:8px 12px; border-radius:6px; margin-bottom:12px;">
      <span style="font-size:11px; font-weight:600; color:#94a3b8;">Server-Umgebung:</span>
      <select id="env-select" style="background:#0e121a; border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:#f8fafc; font-size:11px; padding:2px 6px; outline:none; cursor:pointer;">
        <option value="production">Produktion (Railway)</option>
        <option value="local">Lokal (localhost)</option>
      </select>
    </div>
    
    <!-- Login Form -->
    <div id="login-view" class="view">
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email" required placeholder="name@beispiel.de">
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div id="error-message" class="error-text" style="display:none; margin-bottom:10px; font-size:12px; color:#fca5a5;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%; border:none; cursor:pointer;">Einloggen</button>
      </form>
    </div>

    <!-- Connected View -->
    <div id="connected-view" class="view" style="display:none;">
      <div style="font-size:12px; color:#94a3b8; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
        <span id="user-email"></span>
        <button id="logout-btn" style="background:transparent; border:none; color:#09b0b7; cursor:pointer; text-decoration:underline; font-weight:bold; font-size:12px; padding:0;">Abmelden</button>
      </div>

      <p style="margin:0 0 10px; font-size:12px; color:#cbd5e1;">Wähle ein Angebot und die Plattform – Vintamie öffnet die Seite und füllt alles aus.</p>

      <label id="auto-submit-row" style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); padding:8px 10px; border-radius:6px; margin-bottom:12px; cursor:pointer;">
        <input type="checkbox" id="auto-submit-toggle" style="accent-color:#09b0b7; width:15px; height:15px; cursor:pointer;">
        <span style="font-size:11px; color:#cbd5e1; line-height:1.3;">⚡ Sofort veröffentlichen <span style="color:#94a3b8;">(ohne manuelle Prüfung)</span></span>
      </label>

      <div id="draft-list-status" style="font-size:12px; color:#94a3b8; margin-bottom:8px;">Lade Angebote…</div>
      <div id="draft-list" style="display:flex; flex-direction:column; gap:8px; max-height:320px; overflow-y:auto; margin-bottom:12px;"></div>

      <div class="actions">
        <a href="https://vintamie.henrikheil.net" id="btn-open-dashboard" target="_blank" class="btn btn-primary">Dashboard öffnen</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
