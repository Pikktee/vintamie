<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vintamie Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <span class="logo-text">✨ Vintamie</span>
      <span class="status-badge connected" id="status">Verbunden</span>
    </div>
    
    <div class="content">
      <p>Öffne ein Verkaufsformular auf Vinted oder Kleinanzeigen. Ein <strong>"Vintamie Befüllen"</strong>-Button erscheint direkt auf der Seite.</p>
      
      <div class="actions">
        <a href="http://localhost:5173" target="_blank" class="btn btn-primary">Dashboard öffnen</a>
        <a href="https://www.vinted.de/items/new" target="_blank" class="btn btn-secondary">Vinted aufrufen</a>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
